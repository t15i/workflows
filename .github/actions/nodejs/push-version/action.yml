name: "Update Version"
description: >
  Checks out the specified branch, updates the project version and 
  pushes changes to the remote repository
inputs:
  version:
    description: "New version value to be set"
  branch:
    description: "Git branch to be updated"
  git-user-name:
    description: "Git user name used for the version bump commit"
    default: github-actions[bot]
  git-user-email:
    description: "Git user email used for the version bump commit"
  token:
    description: "Personal access token used to access to the repository"
runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ inputs.branch }}
        token: ${{ inputs.token }}

    - uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc

    - name: "Configure git user"
      shell: bash
      run: |
        git config user.name "${{ inputs.git-user-name }}"
        git config user.email "${{ inputs.git-user-email || format('{0}@users.noreply.github.com', inputs.git-user-name) }}" 
        
    - name: "Update package version"
      shell: bash
      run: npm version "${{ inputs.version }}" -m "Bump version to %s"

    - name: "Push changes"
      shell: bash
      run: git push --tags -f origin ${{ inputs.branch }}
