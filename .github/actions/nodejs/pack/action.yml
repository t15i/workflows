name: "Packaging"
description: >
  Builds the package, optionally updates its version, creates an npm tarball, 
  and uploads it as a GitHub Actions artifact
inputs:
  ref:
    description: "Git ref to check out for packaging"
  version:
    description: "Optional package version to be set before packing"
outputs:
  package-path:
    description: "Name of uploaded artifact"
    value: ${{ steps.pack.outputs.package-path }}
runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}

    - uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        
    - name: "Bump package version"
      if: inputs.version != ''
      shell: bash
      run: npm version --commit-hooks false --git-tag-version false "${{ inputs.version }}"

    - name: "Install dependencies"
      shell: bash
      run: npm ci

    - name: "Build package"
      shell: bash
      run: npm run ci:build

    - name: "Pack"
      id: pack
      shell: bash
      run: echo "package-path=$(pwd)/$(npm pack | tail -n 1)" >> "$GITHUB_OUTPUT"
